<div class="app-container">
  <aside class="sidebar">
    <div class="brand" style="margin-bottom: 3rem; display: flex; align-items: center; gap: 1rem; padding-left: 0.5rem;">
      <div style="background: var(--primary); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 0 15px var(--primary-glow);">🎓</div>
      <span style="font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; color: white;">IES Alcores</span>
    </div>

    <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 0.5rem;">
      <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/alumnos" routerLinkActive="nav-active" class="nav-item">
        <span class="nav-icon">👥</span> Alumnos
      </a>
      <a routerLink="/profesores" routerLinkActive="nav-active" class="nav-item">
        <span class="nav-icon">👨‍🏫</span> Profesores
      </a>
      <a routerLink="/asignaturas" routerLinkActive="nav-active" class="nav-item">
        <span class="nav-icon">📚</span> Asignaturas
      </a>
      <a routerLink="/matriculas" routerLinkActive="nav-active" class="nav-item">
        <span class="nav-icon">📝</span> Matrículas
      </a>
    </nav>

    <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
      <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem;">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(to bottom, #10b981, #059669);"></div>
        <div>
          <p style="font-size: 0.85rem; font-weight: 600;">Admin User</p>
          <p style="font-size: 0.7rem; color: var(--text-muted);">Soporte IT</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<style>
.nav-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  text-decoration: none;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.95rem;
  border-radius: 14px;
  transition: all 0.3s ease;
}

.nav-item:hover {
  background: rgba(255, 255, 255, 0.04);
  color: white;
}

.nav-active {
  background: rgba(139, 92, 246, 0.1) !important;
  color: var(--primary) !important;
  box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.2);
}

.nav-icon {
  font-size: 1.2rem;
  opacity: 0.8;
}

.nav-active .nav-icon {
  opacity: 1;
}
</style>
